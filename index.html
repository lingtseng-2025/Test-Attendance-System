<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#dcdaf6">
<title>iROBOT MEDICINE 智能人醫</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Nunito:wght@700;800;900&display=swap');
:root {
  --bg:#eeedf9; --card:#fff; --sb:#dcdaf6; --border:#b8b3e8;
  --pink:#5046e0; --pd:#3526c0; --pl:#e8e6fb;
  --green:#2eaa6e; --gl:#e0f7ec;
  --orange:#e07c08; --ol:#fff3e0;
  --blue:#2f5fd4; --bl:#e4ecff;
  --yellow:#c9a000; --yl:#fffbe0;
  --text:#565657; --t2:#565657; --t3:#8e89be;
  --sh:0 2px 12px rgba(80,70,224,.12);
  --sh2:0 6px 28px rgba(53,38,192,.20);
  --r:14px;
  --grad:linear-gradient(135deg,#2f5fd4 0%,#5046e0 50%,#7340c8 100%);
  --grad-hero:linear-gradient(160deg,#1e3fa8 0%,#4235cc 45%,#7340c8 100%);
  --font:'Noto Sans TC','Microsoft JhengHei','PingFang TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
body.admin-mode{max-width:100%!important;}

/* ── Safe area ── */
.sab{height:env(safe-area-inset-top,0);background:var(--sb);flex-shrink:0}

/* ── Screens ── */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex}

/* ───────────────── LOGIN ───────────────── */
#loginScreen{background:var(--bg);align-items:center;justify-content:flex-end;padding-bottom:env(safe-area-inset-bottom,24px)}
.login-hero{width:100%;background:var(--grad-hero);flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.lh-circle1{position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.1)}
.lh-circle2{position:absolute;bottom:-80px;left:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.07)}
.lh-logo{font-size:52px;margin-bottom:12px;position:relative;z-index:1}
.lh-title{font-family:Nunito,sans-serif;font-size:24px;font-weight:900;color:#fff;position:relative;z-index:1}
.lh-sub{font-size:13px;color:rgba(255,255,255,.8);margin-top:6px;position:relative;z-index:1}
.login-form{width:100%;background:var(--card);border-radius:28px 28px 0 0;padding:28px 24px calc(24px + env(safe-area-inset-bottom,0));margin-top:-24px;box-shadow:0 -4px 24px rgba(80,70,224,.14)}
.lf-title{font-family:var(--font);font-size:20px;font-weight:900;margin-bottom:20px;color:#565657}
.lf-group{margin-bottom:16px}
.lf-group label{font-size:12px;font-weight:700;color:#565657;display:block;margin-bottom:6px}
.lf-input-wrap{position:relative}
.lf-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.lf-input{width:100%;padding:12px 13px 12px 40px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-family:var(--font);color:var(--text);background:#fff;outline:none;transition:border-color .15s}
.lf-input:focus{border-color:var(--pink)}
.lf-eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:16px;cursor:pointer;padding:4px}
.lf-error{background:#ede8ff;color:var(--pd);font-size:12px;font-weight:600;padding:9px 14px;border-radius:10px;margin-bottom:14px;display:none}
.lf-error.show{display:block}
.lf-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--grad);color:#fff;font-family:'Nunito','Noto Sans TC',sans-serif;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 4px 18px rgba(80,70,224,.42);transition:opacity .15s}
.lf-btn:active{opacity:.88}
.lf-demo{margin-top:16px;display:flex;flex-direction:column;gap:7px}
.lf-demo-title{font-size:11px;color:var(--t3);text-align:center}
.lf-demo-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lf-demo-btn{padding:9px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.lf-demo-btn:hover{border-color:var(--pink);color:var(--pd);background:var(--pl)}

/* ───────────────── SHARED NAV ───────────────── */
.topnav{background:var(--sb);padding:11px 16px 13px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 8px rgba(91,77,232,.1)}
.tn-left{display:flex;align-items:center;gap:9px}
.tn-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.tn-name{font-size:13px;font-weight:700;line-height:1.2;color:#565657}
.tn-role{font-size:10px;color:var(--t2);opacity:.85;display:flex;align-items:center;gap:4px}
.tn-right{display:flex;align-items:center;gap:8px}
.tn-time{font-family:'Nunito','Noto Sans TC',sans-serif;font-size:16px;font-weight:900;color:var(--pd)}
.tn-logout{background:rgba(61,45,184,.12);border:none;border-radius:20px;padding:5px 11px;font-size:11px;font-weight:700;color:var(--pd);cursor:pointer;font-family:'Noto Sans TC',sans-serif}

/* ───────────────── SCROLL AREA ───────────────── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px calc(76px + env(safe-area-inset-bottom,0));display:flex;flex-direction:column;gap:12px}
.scroll::-webkit-scrollbar{display:none}

/* ───────────────── TABBAR ───────────────── */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:50;box-shadow:0 -4px 16px rgba(91,77,232,.1)}
.tb-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 7px;cursor:pointer;color:var(--t3);font-size:9px;font-weight:700;gap:3px;position:relative;transition:color .15s}
.tb-item.active{color:var(--pd)}
.tb-item .tbi{font-size:20px;line-height:1}
.tb-badge{position:absolute;top:5px;right:calc(50% - 18px);background:var(--pink);color:#fff;font-size:9px;font-weight:900;padding:1px 5px;border-radius:20px;min-width:16px;text-align:center}

/* ───────────────── CARDS & COMMON ───────────────── */
.card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);color:#565657}
.sec-title{font-family:var(--font);font-size:14px;font-weight:700;color:#565657;display:flex;align-items:center;justify-content:space-between}
.sec-link{font-size:12px;color:var(--pink);cursor:pointer;font-weight:700}
.bgg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.bg-g{background:var(--gl);color:var(--green)}.bg-o{background:var(--ol);color:var(--orange)}
.bg-r{background:#ffe4e4;color:var(--pd)}.bg-b{background:var(--bl);color:var(--blue)}
.bg-y{background:var(--yl);color:var(--yellow)}.bg-gr{background:#f0f0f0;color:#888}
.bg-pk{background:var(--pl);color:var(--pd)}
.list-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #fef0f0}
.list-row:last-child{border-bottom:none}
.lr-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.lr-info{flex:1;min-width:0}
.lr-name{font-size:13px;font-weight:700;margin-bottom:2px}
.lr-sub{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.sc{background:var(--card);border-radius:var(--r);padding:13px;box-shadow:var(--sh);display:flex;align-items:center;gap:10px}
.sc-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sc-ico.pk{background:var(--pl)}.sc-ico.gn{background:var(--gl)}.sc-ico.or{background:var(--ol)}.sc-ico.bl{background:var(--bl)}.sc-ico.yl{background:var(--yl)}
.sc-label{font-size:10px;color:var(--t3);margin-bottom:1px}
.sc-val{font-family:'Nunito','Noto Sans TC',sans-serif;font-size:20px;font-weight:900}

/* ── Punch Card ── */
.punch-card{background:var(--grad);border-radius:22px;padding:22px;color:#fff;position:relative;overflow:visible;box-shadow:var(--sh2)}
.pc-bg1{position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.1);pointer-events:none}
.pc-bg2{position:absolute;bottom:-40px;right:60px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;position:relative;z-index:1;margin-bottom:16px}
.pc-label{font-size:12px;opacity:.85;margin-bottom:3px}
.pc-big{font-family:'Nunito','Noto Sans TC',sans-serif;font-size:36px;font-weight:900;line-height:1}
.pc-status{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:7px}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.s-in{background:#a8ffd0}.s-out{background:#ffd480}.s-none{background:#ffa8a8}
.pc-btns{display:flex;gap:10px;position:relative;z-index:1}
.pb{flex:1;height:52px;border-radius:14px;border:none;cursor:pointer;font-family:'Nunito','Noto Sans TC',sans-serif;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .18s}
.pb:active{transform:scale(.95)}
.pb.in{background:#fff;color:var(--pd);box-shadow:0 4px 16px rgba(80,70,224,.18)}
.pb.out{background:rgba(255,255,255,.18);color:#fff;border:2px solid rgba(255,255,255,.4)}
.pb:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(255,255,255,.5)}70%{box-shadow:0 0 0 12px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
.pulse{animation:ring 2s infinite}

/* ── Info grid ── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ig{background:var(--card);border-radius:var(--r);padding:13px;box-shadow:var(--sh);display:flex;align-items:center;gap:10px}
.ig-ico{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ig-ico.pk{background:var(--pl)}.ig-ico.gn{background:var(--gl)}.ig-ico.or{background:var(--ol)}.ig-ico.bl{background:var(--bl)}
.ig-label{font-size:10px;color:var(--t3);margin-bottom:2px}
.ig-val{font-family:'Nunito','Noto Sans TC',sans-serif;font-size:18px;font-weight:900}

/* ── Forms ── */
.fg{margin-bottom:13px}
.fg label{font-size:12px;font-weight:700;color:#565657;display:block;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Noto Sans TC',sans-serif;color:var(--text);background:#fff;outline:none;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pink)}
.fg textarea{min-height:76px;resize:none}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.save-btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--grad);color:#fff;font-family:'Nunito','Noto Sans TC',sans-serif;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(80,70,224,.32);margin-top:4px}
.save-btn:active{opacity:.88}

/* ── Quota ── */
.qi{padding:11px 0;border-bottom:1px solid #fef0f0}
.qi:last-child{border-bottom:none}
.qi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.qi-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px}
.qi-nums{font-family:'Nunito','Noto Sans TC',sans-serif;font-size:13px;font-weight:800;color:var(--t2)}
.qi-bar{height:5px;background:#fce4e4;border-radius:3px;overflow:hidden}
.qi-fill{height:100%;border-radius:3px;transition:width 1s .1s ease}

/* ── Sheet ── */
.overlay{position:fixed;inset:0;background:rgba(45,20,20,.38);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;display:flex;align-items:flex-end;justify-content:center}
.overlay.show{opacity:1;pointer-events:all}
.sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:0 0 env(safe-area-inset-bottom,16px);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.36,1);max-height:90vh;display:flex;flex-direction:column}
.overlay.show .sheet{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sh-hd{padding:12px 18px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sh-title{font-family:'Nunito','Noto Sans TC',sans-serif;font-size:17px;font-weight:900}
.sh-close{width:28px;height:28px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;font-size:14px;color:var(--t2)}
.sh-body{padding:4px 18px 12px;overflow-y:auto;flex:1}
.sh-btns{display:grid;gap:9px;padding:10px 18px 0;flex-shrink:0}
.sh-btns.two{grid-template-columns:1fr 1fr}
.sh-btns.three{grid-template-columns:1fr 1fr 1fr}
.sbtn{padding:12px;border-radius:12px;border:none;cursor:pointer;font-family:'Nunito','Noto Sans TC',sans-serif;font-size:13px;font-weight:800;transition:all .15s}
.sbtn:active{transform:scale(.97)}
.sbtn.cancel{background:var(--bg);color:var(--t2)}
.sbtn.confirm{background:var(--grad);color:#fff;box-shadow:0 4px 14px rgba(80,70,224,.32)}
.sbtn.confirm:disabled{opacity:.38;cursor:not-allowed;transform:none!important}
.sbtn.approve{background:var(--green);color:#fff}
.sbtn.reject{background:var(--pd);color:#fff}

/* ── GPS box ── */
.gps-box{background:var(--bg);border-radius:11px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px}
.gps-dot{width:10px;height:10px;border-radius:50%;margin-top:3px;flex-shrink:0}
.gps-dot.ok{background:var(--green)}.gps-dot.loading{background:var(--yellow);animation:blink 1s infinite}.gps-dot.err{background:var(--pd)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.gps-text{font-size:12px;line-height:1.6;color:var(--t2)}
.gps-coord{font-family:'Nunito','Noto Sans TC',sans-serif;font-size:10px;color:var(--t3);margin-top:2px}
.dist-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;margin-top:5px}
.dist-ok{background:var(--gl);color:var(--green)}.dist-warn{background:var(--ol);color:var(--orange)}.dist-far{background:#ffe4e4;color:var(--pd)}

/* ── Table ── */
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 8px;text-align:left;color:#8e89be;font-size:10px;font-weight:700;border-bottom:2px solid var(--bg);white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid #fef0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}

/* ── Month summary ── */
.ms{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.ms-item{background:var(--card);border-radius:12px;padding:11px;text-align:center;box-shadow:var(--sh)}
.ms-label{font-size:10px;color:#8e89be;margin-bottom:3px}
.ms-val{font-family:'Nunito','Noto Sans TC',sans-serif;font-size:17px;font-weight:900}
.ra{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ra-btn{padding:11px;border-radius:12px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:'Nunito','Noto Sans TC',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px}
.ra-btn.ol{background:#fff;color:var(--pd);border:1.5px solid var(--pink);box-shadow:var(--sh)}
.ra-btn.so{background:var(--grad);color:#fff;box-shadow:0 3px 12px rgba(80,70,224,.28)}

/* ── Toggle switch ── */
.toggle-track{position:relative;display:inline-block;width:46px;height:26px;flex-shrink:0;cursor:pointer}
.toggle-track input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:13px;transition:.25s}
.toggle-slider:before{content:'';position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle-track input:checked + .toggle-slider{background:var(--pink)}
.toggle-track input:checked + .toggle-slider:before{transform:translateX(20px)}

/* ── Toast ── */
.toast{position:fixed;top:calc(env(safe-area-inset-top,0) + 14px);left:50%;transform:translateX(-50%) translateY(-80px);background:var(--text);color:#fff;padding:10px 20px;border-radius:28px;font-size:13px;font-weight:600;z-index:300;transition:transform .3s cubic-bezier(.175,.885,.32,1.275);display:flex;align-items:center;gap:7px;box-shadow:0 8px 24px rgba(0,0,0,.2);max-width:90vw;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── Admin role switcher ── */
.role-switch{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:2px;flex-shrink:0;gap:4px}
.rs-btn{flex:1;padding:8px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:'Nunito','Noto Sans TC',sans-serif;color:var(--t2);background:transparent;transition:all .18s}
.rs-btn.active{background:var(--card);color:var(--pd);box-shadow:var(--sh)}

/* ── GPS records ── */
.gps-rec{background:var(--bg);border-radius:10px;padding:9px 11px;margin-bottom:7px}
.gr-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.gr-name{font-size:13px;font-weight:700}
.gr-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);margin-top:3px}
.gr-coord{font-family:'Nunito','Noto Sans TC',sans-serif;font-size:10px;color:var(--t3)}

/* ── Emp card ── */
.emp-card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);cursor:pointer;transition:all .18s;border:2px solid transparent}
.emp-card:active{border-color:var(--pink)}

/* ── Map ── */
.map-legend{background:rgba(255,255,255,.95);border-radius:10px;padding:8px 12px;font-size:11px;display:flex;flex-wrap:wrap;gap:8px;box-shadow:var(--sh);margin-top:8px}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2);font-weight:600}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .28s ease both}
.fu1{animation-delay:.07s}.fu2{animation-delay:.14s}.fu3{animation-delay:.21s}

@media print{
  .tabbar,.topnav,.sab,.ra,.no-print,.role-switch{display:none!important}
  body,.scroll{overflow:visible;max-height:none}
  .scroll{padding:0}
  .card{box-shadow:none;border:1px solid #ddd}
}
</style>
</head>
<body>

<div class="sab" id="safeBar"></div>

<!-- ═══════════════ LOGIN SCREEN ═══════════════ -->
<div class="screen active" id="loginScreen">
  <div class="login-hero">
    <div class="lh-circle1"></div>
    <div class="lh-circle2"></div>
    <div style="position:relative;z-index:1;text-align:center;padding:0 20px">
      <div style="font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:26px;font-weight:900;color:#fff;letter-spacing:2px;line-height:1.2">iROBOT MEDICINE</div>
      <div style="font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,.92);margin-top:6px;letter-spacing:4px">智能人醫</div>
      <div style="width:40px;height:2px;background:rgba(255,255,255,.4);border-radius:1px;margin:14px auto"></div>
      <div style="font-size:12px;color:rgba(255,255,255,.75);letter-spacing:1px">員工打卡暨人資管理系統</div>
    </div>

const LEAVE_LABEL={annual:'特休假',sick:'病假',personal:'事假',marriage:'婚假',funeral:'喪假',official:'公假'};

// ── Getters ────────────────────────────────────────
const getAccounts=()=>LS.get('accounts')||[];
const getEmps=()=>LS.get('employees')||[];
const getRecs=()=>LS.get('records')||[];
const getApps=()=>LS.get('leaveApps')||[];
const getMakeupApps=()=>LS.get('makeupApps')||[];
const getQuota=()=>LS.get('leaveQuota')||{};
const getCfg=()=>LS.get('companySettings')||COMPANY_DEFAULTS;
const getEmpById=id=>getEmps().find(e=>e.id===id)||null;

function calcHours(inT,outT,rule){
  if(!inT||!outT) return 0;
  const d=(new Date(outT)-new Date(inT))/3600000;
  if(rule==='deduct_lunch') return Math.max(0,d-1);
  if(rule==='deduct_both') return Math.max(0,d-2);
  return Math.max(0,d);
}
function haversine(a,b,c,d){
  const R=6371000,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}
function fmtTime(iso){if(!iso)return '--';return new Date(iso).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false})}
function todayKey(){return new Date().toISOString().slice(0,10)}
function getTodayRec(empId){return getRecs().find(r=>r.date===todayKey()&&r.empId===empId)||null}
function saveRec(rec){
  const rs=getRecs().filter(r=>!(r.date===rec.date&&r.empId===rec.empId));
  rs.push(rec); LS.set('records',rs);
}
function getMonthRecs(y,m,empId){
  return getRecs().filter(r=>{const d=new Date(r.date);return r.empId===empId&&d.getFullYear()===y&&d.getMonth()===m});
}

let currentUser=null; // {id, role, empData}
let clockIntervals=[];

function doLogin(){
  const id=document.getElementById('loginId').value.trim();
  const pw=document.getElementById('loginPw').value;
  if(!id||!pw){document.getElementById('loginError').classList.add('show');return;}
  document.getElementById('loginError').classList.remove('show');
  const btn=document.querySelector('.lf-btn');
  if(btn){btn.textContent='登入中...';btn.disabled=true;}
  // SHA-256 hash then load from Supabase
  (window.sha256?window.sha256(pw):Promise.resolve(pw)).then(async function(hash){
    if(window.loadAllData) await window.loadAllData();
    const accs=getAccounts();
    const acc=accs.find(a=>a.id===id&&a.pw===hash);
    if(!acc){
      document.getElementById('loginError').classList.add('show');
      document.getElementById('loginPw').value='';
      if(btn){btn.textContent='登入';btn.disabled=false;}
      return;
    }
    document.getElementById('loginError').classList.remove('show');
    const emp=getEmpById(acc.id);
    currentUser={id:acc.id,role:acc.role,empData:emp};
    if(acc.role==='admin'){
      document.body.classList.add('admin-mode');
      showScreen('adminScreen');startAdminSession();
    }else{showScreen('empScreen');startEmpSession();}
    if(btn){btn.textContent='登入';btn.disabled=false;}
  });
}

function doLogout(){
  clockIntervals.forEach(clearInterval);
  clockIntervals=[];
  currentUser=null;
  adminMode='admin';
  document.getElementById('loginId').value='';
  document.getElementById('loginPw').value='';
  showScreen('loginScreen');
}

function toggleEye(){
  const inp=document.getElementById('loginPw');
  inp.type=inp.type==='password'?'text':'password';
}

document.getElementById('loginPw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

function startEmpSession(){
  const emp=currentUser.empData;
  if(!emp) return;
  document.getElementById('empNameTop').textContent=emp.name;
  document.getElementById('empDeptTop').textContent=emp.dept;
  document.getElementById('empAvColor').style.background=`${emp.color}33`;
  document.getElementById('empAvColor').style.color=emp.color;
  // clock
  function tick(){
    const el=document.getElementById('empClock');
    if(el) el.textContent=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false});
  }
  tick();
  clockIntervals.push(setInterval(tick,1000));
  empTab('clock');
  updateEmpBadge();
}

let currentEmpTab='clock';
function empTab(tab){
  currentEmpTab=tab;
  document.querySelectorAll('#empTabbar .tb-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('etab-'+tab).classList.add('active');
  const s=document.getElementById('empScroll');
  s.innerHTML='';
  if(tab==='clock') renderEmpClock(s);
  else if(tab==='monthly') renderEmpMonthly(s);
  else if(tab==='leave') renderLeaveList(s);
  else if(tab==='status') renderLeaveStatus(s);
  else if(tab==='quota') renderQuota(s);
  else if(tab==='profile') renderEmpProfile(s);
  updateEmpBadge();
}

function updateEmpBadge(){
  if(!currentUser) return;
  const leavePending=getApps().filter(a=>a.empId===currentUser.id&&a.status==='pending').length;
  const makeupPending=getMakeupApps().filter(a=>a.empId===currentUser.id&&a.status==='pending').length;
  const p=leavePending+makeupPending;
  const b=document.getElementById('empLeaveBadge');
  if(b){b.style.display=p?'inline':'none';b.textContent=p;}
}

// ── Employee Clock ─────────────────────────────────
function renderEmpClock(s){
  const emp=currentUser.empData;
  const rec=getTodayRec(currentUser.id);
  const inT=rec?rec.in||null:null;
  const outT=rec?rec.out||null:null;
  const hours=calcHours(inT,outT,emp.workRule);
  const OT=Math.max(0,hours-8);
  const now=new Date();
  const mRecs=getMonthRecs(now.getFullYear(),now.getMonth(),currentUser.id).filter(r=>r.in);
  const mOT=getMonthRecs(now.getFullYear(),now.getMonth(),currentUser.id).reduce((a,r)=>a+Math.max(0,calcHours(r.in,r.out,emp.workRule)-8),0);

  s.innerHTML=[
    buildPunchCard(inT,outT,hours,OT,emp),
    buildInfoGrid(inT,outT,mRecs.length,mOT),
    '<div class="sec-title fu fu2"><span>&#x1F4CB; 最近打卡</span></div>',
    '<div class="card fu fu2" id="recentRowsContainer"></div>',
    '<div class="sec-title fu fu3"><span>&#x1F527; 補打卡申請</span></div>',
    '<div class="card fu fu3" onclick="openMakeupSheet()" style="cursor:pointer;display:flex;align-items:center;gap:12px;border:1.5px dashed var(--border)">',
    '<div style="width:40px;height:40px;border-radius:12px;background:var(--ol);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">&#x1F527;</div>',
    '<div><div style="font-size:13px;font-weight:700">忘記打卡？申請補打卡</div>',
    '<div style="font-size:11px;color:var(--t3);margin-top:2px">需定位驗證 + 主管審核</div></div>',
    '<div style="margin-left:auto;color:var(--t3);font-size:18px">›</div></div>'
  ].join('');

  document.getElementById('recentRowsContainer').innerHTML=recentRows(emp,5);
  startPunchClock(inT,outT,emp.workRule);
}


// ── Shared punch helpers ──────────────────────────
function buildPunchCard(inT,outT,hours,OT,emp,extraClass){
  extraClass=extraClass||'';
  const statusLabel=outT?'已下班':inT?'上班中':'尚未打卡';
  const sdot=outT?'s-out':inT?'s-in':'s-none';
  const pLabel=hours>0&&outT?'今日工時':hours>0?'上班中工時':'現在時間';
  const pVal=hours>0?hours.toFixed(1)+' h':'--:--';
  const rule=RULE_LABEL[emp.workRule]||emp.workRule;
  const OTval=OT>0?OT.toFixed(1)+' h':'--';

  const btnIn='<button class="pb in'+(inT?'':' pulse')+'" onclick="openPunch(\'in\')"'+(inT?' disabled':'')+'>&#x1F446; 上班打卡</button>';
  const btnOut='<button class="pb out" onclick="openPunch(\'out\')"'+((!inT||outT)?' disabled':'')+'>&#x1F44B; 下班打卡</button>';

  return '<div class="punch-card fu '+extraClass+'">'
    +'<div class="pc-bg1"></div><div class="pc-bg2"></div>'
    +'<div class="pc-top">'
    +'<div>'
    +'<div class="pc-label" id="punchLabel">'+pLabel+'</div>'
    +'<div class="pc-big" id="punchClock">'+pVal+'</div>'
    +'<div id="punchDate" style="font-size:11px;opacity:.75;margin-top:2px"></div>'
    +'<div class="pc-status" style="margin-top:6px"><span class="sdot '+sdot+'"></span>'+statusLabel+'</div>'
    +'<div style="font-size:11px;opacity:.7;margin-top:4px">&#x1F4E1; GPS驗證 &middot; '+rule+'</div>'
    +'</div>'
    +'<div style="text-align:right">'
    +'<div style="font-size:11px;opacity:.8">加班</div>'
    +'<div style="font-size:22px;font-weight:900">'+OTval+'</div>'
    +'</div>'
    +'</div>'
    +'<div class="pc-btns">'+btnIn+btnOut+'</div>'
    +'</div>';
}

function buildInfoGrid(inT,outT,mDays,mOT){
  return '<div class="info-grid fu fu1">'
    +'<div class="ig"><div class="ig-ico gn">&#x1F305;</div><div><div class="ig-label">上班時間</div><div class="ig-val">'+fmtTime(inT)+'</div></div></div>'
    +'<div class="ig"><div class="ig-ico pk">&#x1F306;</div><div><div class="ig-label">下班時間</div><div class="ig-val">'+fmtTime(outT)+'</div></div></div>'
    +'<div class="ig"><div class="ig-ico bl">&#x1F4C5;</div><div><div class="ig-label">本月出勤</div><div class="ig-val" style="color:var(--blue)">'+mDays+'天</div></div></div>'
    +'<div class="ig"><div class="ig-ico or">&#x1F525;</div><div><div class="ig-label">本月加班</div><div class="ig-val" style="color:var(--orange)">'+mOT.toFixed(1)+'h</div></div></div>'
    +'</div>';
}

function startPunchClock(inT,outT,rule){
  var tickPunch=function(){
    var el=document.getElementById('punchClock');
    var dl=document.getElementById('punchDate');
    var ll=document.getElementById('punchLabel');
    if(!el) return;
    var n=new Date();
    if(!inT){
      el.textContent=n.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
      if(dl) dl.textContent=n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日（週'+WDAY[n.getDay()]+'）';
    } else if(inT&&!outT){
      var h=calcHours(inT,n.toISOString(),rule);
      el.textContent=h.toFixed(1)+' h';
      if(dl) dl.textContent='上班中 · 持續計時...';
      if(ll) ll.textContent='上班中工時';
    }
  };
  tickPunch();
  var _piv=setInterval(function(){
    if(!document.getElementById('punchClock')){clearInterval(_piv);return;}
    tickPunch();
  },1000);
  clockIntervals.push(_piv);
}


function recentRows(emp,limit){
  const recs=getRecs().filter(r=>r.empId===emp.id).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,limit);
  if(!recs.length) return '<div style="text-align:center;padding:18px;color:var(--t3);font-size:13px">尚無打卡紀錄</div>';
  return recs.map(r=>{
    const d=new Date(r.date);
    const h=calcHours(r.in,r.out,emp.workRule), OT=Math.max(0,h-8);
    let badge='';
    if(r.in&&r.out){
      badge='<span class="bgg bg-g">正常</span>';
      if(OT>0) badge+='<span class="bgg bg-o" style="margin-left:3px">+'+OT.toFixed(1)+'h</span>';
    } else if(r.in){
      badge='<span class="bgg bg-y">未下班</span>';
    } else {
      badge='<span class="bgg bg-gr">缺勤</span>';
    }
    const dateBox='<div style="width:38px;height:38px;background:var(--bg);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">'
      +'<div style="font-size:15px;font-weight:900;line-height:1">'+d.getDate()+'</div>'
      +'<div style="font-size:9px;color:var(--t3)">週'+WDAY[d.getDay()]+'</div></div>';
    const info='<div class="lr-info">'
      +'<div class="lr-name" style="font-size:13px">'+fmtTime(r.in)+' → '+fmtTime(r.out)+'</div>'
      +'<div class="lr-sub">'+(h>0?'工時 '+h.toFixed(1)+'h':'--')+'</div></div>';
    return '<div class="list-row">'+dateBox+info+badge+'</div>';
  }).join('');
}

// ── Employee Monthly ───────────────────────────────
function renderEmpMonthly(s){
  const emp=currentUser.empData;
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth();
  const recs=getMonthRecs(y,m,emp.id);
  const leaveApps=getApps().filter(a=>a.empId===emp.id&&a.status==='approved');
  const daysInMonth=new Date(y,m+1,0).getDate();
  let rows=[],tH=0,wDays=0,tOT=0;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(ds).getDay();
    if((dow===0||dow===6)&&!recs.find(r=>r.date===ds)) continue;
    const rec=recs.find(r=>r.date===ds);
    const leave=leaveApps.find(a=>ds>=a.startDate&&ds<=a.endDate);
    const h=rec?calcHours(rec.in,rec.out,emp.workRule):0;
    const OT=Math.max(0,h-8);
    if(h>0){tH+=h;wDays++;tOT+=OT;}
    const badge=leave?`<span class="bgg bg-b">${LEAVE_LABEL[leave.type]||leave.type}</span>`:rec?.in&&rec?.out?(OT>0?`<span class="bgg bg-o">+${OT.toFixed(1)}h</span>`:`<span class="bgg bg-g">正常</span>`):rec?.in?`<span class="bgg bg-y">未下班</span>`:`<span class="bgg bg-gr">缺勤</span>`;
    rows.push({ds,dow,d,rec,h,OT,badge});
  }
  s.innerHTML=`
  <div class="ms fu"><div class="ms-item"><div class="ms-label">出勤天數</div><div class="ms-val" style="color:var(--pd)">${wDays}</div></div><div class="ms-item"><div class="ms-label">總工時</div><div class="ms-val" style="color:var(--green)">${tH.toFixed(1)}</div></div><div class="ms-item"><div class="ms-label">加班時數</div><div class="ms-val" style="color:var(--orange)">${tOT.toFixed(1)}</div></div></div>
  <div class="ra fu fu1">
    <button class="ra-btn ol" onclick="window.print()">🖨️ 列印</button>
    <button class="ra-btn so" onclick="exportExcel('${emp.id}',${y},${m+1})">📥 Excel</button>
    <button class="ra-btn ol" onclick="openEmailSheet(${y},${m+1})" style="grid-column:1/-1">📧 Email 寄送</button>
  </div>
  <div class="card fu fu2" style="overflow-x:auto;padding:10px">
    <table>
      <thead><tr><th>日期</th><th>上班</th><th>下班</th><th>工時</th><th>狀態</th></tr></thead>
      <tbody>
        ${rows.map(r=>`<tr><td>${r.d}日(${WDAY[r.dow]})</td><td>${r.rec?.in?fmtTime(r.rec.in):'--'}</td><td>${r.rec?.out?fmtTime(r.rec.out):'--'}</td><td>${r.h>0?r.h.toFixed(1)+'h':'--'}</td><td>${r.badge}</td></tr>`).join('')}
        <tr style="font-weight:700"><td colspan="3" style="color:var(--t2)">月合計</td><td style="color:var(--pd)">${tH.toFixed(1)}h</td><td></td></tr>
      </tbody>
    </table>
  </div>`;
}

function renderAppsRows(empId){
  const apps=getApps().filter(a=>a.empId===empId).sort((a,b)=>b.appliedAt.localeCompare(a.appliedAt));
  if(!apps.length) return '<div style="text-align:center;padding:18px;color:var(--t3);font-size:13px">尚無申請紀錄</div>';
  return apps.map(function(a){
    return '<div class="list-row">'
      +'<div class="lr-av" style="font-size:12px;font-weight:800;'
      +(a.status==='approved'?'background:var(--gl);color:var(--green)':a.status==='rejected'?'background:#ffe4e4;color:var(--pd)':'background:var(--yl);color:var(--yellow)')

      +'<div class="lr-info">'
      +'<div class="lr-name">'+(LEAVE_LABEL[a.type]||a.type)+'</div>'
      +'<div class="lr-sub">'+a.startDate+(a.startDate!==a.endDate?' ~ '+a.endDate:'')+(a.days?' · '+a.days+'天':'')+'</div>'
      +'</div>'

// ── Leave status ───────────────────────────────────
function leaveStatusBadge(a){
  if(a.status==='rejected') return '<span class="bgg bg-r">&#x274C; 已拒絕</span>';
  if(a.status==='approved') return '<span class="bgg bg-g">&#x2705; 全數核准</span>';
  if(a.status==='sup_approved') return '<span class="bgg bg-b">&#x1F4CB; HR審核中</span>';
  return '<span class="bgg bg-y">&#x23F3; 主管審核中</span>';
}
function leaveStageBar(a){
  var s1=a.status==='rejected'&&a.stage==='sup'?'rejected':a.status==='sup_approved'||a.status==='approved'||a.status==='rejected'?'done':'active';
  var s2=a.status==='approved'?'done':a.status==='rejected'&&a.stage==='hr'?'rejected':a.status==='sup_approved'?'active':'wait';
  var c={'done':'var(--green)','active':'var(--blue)','rejected':'var(--pd)','wait':'var(--t3)'};
  var l={'done':'&#x2705;','active':'&#x23F3;','rejected':'&#x274C;','wait':'&#x25CB;'};
  return '<div style="display:flex;align-items:center;gap:6px;margin:8px 0 4px;font-size:11px">'
    +'<span style="color:'+c[s1]+'">'+l[s1]+'</span>'
    +'<span style="color:'+c[s1]+';font-weight:600">直屬主管</span>'
    +'<span style="color:var(--t3);flex:1;border-top:1px dashed var(--border);margin:0 4px"></span>'
    +'<span style="color:'+c[s2]+'">'+l[s2]+'</span>'
    +'<span style="color:'+c[s2]+';font-weight:600">HR主管</span>'
    +'</div>';
}
function renderLeaveStatus(s){
  const apps=getApps().filter(a=>a.empId===currentUser.id).sort((a,b)=>b.appliedAt.localeCompare(a.appliedAt));
  // 補打卡申請也在此頁顯示
  var makeupApps=getMakeupApps().filter(function(a){return a.empId===currentUser.id;}).sort(function(a,b){return b.appliedAt.localeCompare(a.appliedAt);});
  var html='<div class="sec-title fu"><span>&#x1F4CB; 假期申請狀態</span></div>';
  if(!apps.length){
    html+='<div class="card fu fu1" style="text-align:center;padding:24px;color:var(--t3)">尚無申請紀錄</div>';
  } else {
    apps.forEach(function(a,i){
      var supEmp=getEmpById(a.supId||'');
      html+='<div class="card fu" style="animation-delay:'+(i*.05)+'s">'
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px">'
        +'<div><div style="font-size:14px;font-weight:700">'+(LEAVE_LABEL[a.type]||a.type)+'</div>'
        +'<div style="font-size:11px;color:var(--t3);margin-top:2px">'+a.startDate+(a.startDate!==a.endDate?' ～ '+a.endDate:'')+(a.days?' · '+a.days+'天':'')+'</div></div>'
        +leaveStatusBadge(a)
        +'</div>'
        +leaveStageBar(a)
        +'<div style="font-size:12px;color:var(--t2);background:var(--bg);border-radius:8px;padding:8px 10px;line-height:1.7;margin-top:6px">'
        +'<div>原因：'+a.reason+'</div>'
        +'<div>直屬主管：'+(supEmp?supEmp.name:'--')+'</div>'
        +'<div>代理人：'+(a.proxy||'--')+'</div>'
        +(a.attachName?'<div>&#x1F4CE; 附件：'+a.attachName+'</div>':'')

// ── Quota ──────────────────────────────────────────
function renderQuota(s,empId=null){
  const id=empId||currentUser.id;
  const q=getQuota();
  const apps=getApps().filter(a=>a.empId===id&&a.status==='approved');
  function usedDays(type){return apps.filter(a=>a.type===type).reduce((sum,a)=>{let d=0,cur=new Date(a.startDate),end=new Date(a.endDate);while(cur<=end){if(cur.getDay()!==0&&cur.getDay()!==6)d++;cur.setDate(cur.getDate()+1);}return sum+d;},0);}
  const types=[{key:'annual',icon:'🌴',label:'特休假',color:'var(--green)'},{key:'sick',icon:'🤒',label:'病假',color:'var(--blue)'},{key:'personal',icon:'🎉',label:'事假',color:'var(--orange)'},{key:'marriage',icon:'💐',label:'婚假',color:'var(--pink)'},{key:'funeral',icon:'😢',label:'喪假',color:'#999'},{key:'official',icon:'🏛️',label:'公假',color:'#999'}];
  s.innerHTML=`
  <div class="sec-title fu"><span>🎯 假期額度</span></div>
  <div class="card fu fu1">
    ${types.map(t=>{const total=q[t.key]||0,used=usedDays(t.key),remain=Math.max(0,total-used),pct=total>0?(remain/total*100):0;
    return `<div class="qi"><div class="qi-top"><div class="qi-name">${t.icon} ${t.label}</div><div class="qi-nums" style="color:${t.color}">${remain} <span style="color:var(--t3);font-size:11px;font-weight:500">/ ${total} 天</span></div></div><div class="qi-bar"><div class="qi-fill" style="width:${pct}%;background:${t.color}"></div></div><div style="font-size:10px;color:var(--t3);margin-top:3px">已使用 ${used} 天</div></div>`;}).join('')}
  </div>`;
}

function togglePwVis(id){
  const el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
}

function changePassword(){
  const curPw=document.getElementById('curPw').value;
  const newPw=document.getElementById('newPw').value;
  const confirmPw=document.getElementById('confirmPw').value;
  const errEl=document.getElementById('pwError');
  const accs=getAccounts();
  const acc=accs.find(a=>a.id===currentUser.id);
  if(!acc||acc.pw!==curPw){
    errEl.textContent='目前密碼錯誤，請重新輸入';
    errEl.style.display='block';return;
  }
  if(newPw.length<6){
    errEl.textContent='新密碼至少需要 6 個字元';
    errEl.style.display='block';return;
  }
  if(newPw!==confirmPw){
    errEl.textContent='兩次密碼輸入不一致，請確認';
    errEl.style.display='block';return;
  }
  errEl.style.display='none';
  const idx=accs.findIndex(a=>a.id===currentUser.id);
  accs[idx].pw=newPw;
  LS.set('accounts',accs);
  document.getElementById('curPw').value='';
  document.getElementById('newPw').value='';
  document.getElementById('confirmPw').value='';
  toast('🔒','密碼修改成功！');
}

  const cfg=getCfg();

  markers.push({lat:cfg.lat,lng:cfg.lng,label:'🏢 '+cfg.name,type:'company'});
  recs.forEach(rec=>{
    const emp=emps.find(e=>e.id===rec.empId);
    if(!emp) return;
    if(rec.gpsIn) markers.push({lat:rec.gpsIn.lat,lng:rec.gpsIn.lng,label:`${emp.name} 上班`,type:'in'});
    if(rec.gpsOut) markers.push({lat:rec.gpsOut.lat,lng:rec.gpsOut.lng,label:`${emp.name} 下班`,type:'out'});
  });
  const markerJS=markers.map(m=>{
    const icon=m.type==='company'?'🏢':m.type==='in'?'🟢':'🔵';
    return `L.marker([${m.lat},${m.lng}]).addTo(map).bindPopup('<b>${icon} ${m.label}</b><br>${m.lat}, ${m.lng}');`;
  }).join('\n');
  const mapHTML=`<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"><\/script><style>*{margin:0;padding:0}#map{width:100%;height:100vh}</style></head><body><div id="map"></div><script>const map=L.map('map').setView([${cfg.lat},${cfg.lng}],17);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(map);L.circle([${cfg.lat},${cfg.lng}],{radius:${cfg.rangeM},color:'#5046e0',fillColor:'#5046e0',fillOpacity:0.08,weight:2,dashArray:'6'}).addTo(map);${markerJS}\u003C/script></body></html>`;
  const blob=new Blob([mapHTML],{type:'text/html'});
  const blobURL=URL.createObjectURL(blob);
  s.innerHTML=`
  <div class="sec-title fu"><span>🗺️ 今日打卡 GPS 地圖</span></div>
  <div class="card fu fu1" style="padding:0;overflow:hidden">

  </div>

    <div class="leg-item"><div class="leg-dot" style="background:#e00"></div>公司</div>

    <div class="leg-item"><div class="leg-dot" style="background:var(--blue)"></div>下班</div>
    <div class="leg-item"><div class="leg-dot" style="background:rgba(80,70,224,.25);border:2px dashed var(--pink)"></div>範圍 ${cfg.rangeM}m</div>
  </div>
  <div class="sec-title fu fu2"><span>📍 座標明細</span></div>
  <div class="card fu fu2">
    ${recs.length===0?'<div style="text-align:center;padding:16px;color:var(--t3);font-size:13px">今日尚無打卡紀錄</div>':
    recs.map(rec=>{
      const emp=emps.find(e=>e.id===rec.empId);if(!emp)return'';
      const distIn=rec.gpsIn?haversine(rec.gpsIn.lat,rec.gpsIn.lng,cfg.lat,cfg.lng):null;

    }).join('')}

}

        +'<div class="lr-name">'+a.empName+' &#x2014; '+(LEAVE_LABEL[a.type]||a.type)+'</div>'
        +'<div class="lr-sub">'+a.startDate+(a.startDate!==a.endDate?' ~ '+a.endDate:'')+(a.days?' · '+a.days+'天':'')+'</div>'
        +(a.supNote?'<div class="lr-sub">主管：'+a.supNote+'</div>':'')
        +(a.hrNote?'<div class="lr-sub">HR：'+a.hrNote+'</div>':'')

          +(a.gps&&a.gps.lat?'<div class="lr-sub">&#x1F4CD; '+a.gps.lat+', '+a.gps.lng+'</div>':'<div class="lr-sub" style="color:var(--t3)">&#x1F4CD; 無定位</div>')

function doMakeupReview(status){
  var realId=reviewingId.replace('MAKEUP:','');
  var apps=getMakeupApps();
  var idx=apps.findIndex(function(a){return a.id===realId;});
  if(idx===-1) return;
  var note=document.getElementById('reviewNote')?document.getElementById('reviewNote').value||'':'';
  var now=new Date().toISOString();
  var a=apps[idx];
  if(status==='rejected'){
    a.status='rejected';
    if(a.status==='pending'){a.supNote=note;a.supReviewedAt=now;}
    else{a.hrNote=note;a.hrReviewedAt=now;}
    a.supNote=a.supNote||note;
    a.hrNote=a.stage==='hr'?note:a.hrNote;
    a.status='rejected';
  } else {
    if(a.status==='pending'){
      a.status='sup_approved';
      a.stage='hr';
      a.supNote=note;
      a.supReviewedAt=now;
    } else if(a.status==='sup_approved'){
      // 最終核准，寫入打卡紀錄
      a.status='approved';
      a.stage='done';
      a.hrNote=note;
      a.hrReviewedAt=now;
      applyMakeupToRecord(a);
    }
  }
  apps[idx]=a;
  LS.set('makeupApps',apps);
  closeSheet('reviewSheet');
  var msg=status==='rejected'?'已拒絕 '+a.empName+' 的補打卡':a.status==='sup_approved'?'第1層核准！已通知HR':'&#x2705; 補打卡已核准並寫入紀錄';
  toast(status==='rejected'?'&#x274C;':'&#x2705;',msg);
  renderApprove(document.getElementById('adminScroll'));
  updateAdminBadge();
}

function applyMakeupToRecord(a){
  // 補打卡核准後，自動寫入/更新打卡紀錄
  var recs=getRecs();
  var existing=recs.find(function(r){return r.date===a.date&&r.empId===a.empId;});
  var emp=getEmpById(a.empId);
  var timeISO=a.date+'T'+a.punchTime+':00';
  if(existing){
    if(a.punchType==='in'&&!existing.in){
      existing.in=timeISO;
      existing.gpsIn={lat:a.gps?a.gps.lat:null,lng:a.gps?a.gps.lng:null,acc:a.gps?a.gps.acc:null,makeup:true};
    } else if(a.punchType==='out'&&!existing.out){
      existing.out=timeISO;
      existing.gpsOut={lat:a.gps?a.gps.lat:null,lng:a.gps?a.gps.lng:null,acc:a.gps?a.gps.acc:null,makeup:true};
    }
    LS.set('records',recs);
  } else {
    var newRec={date:a.date,empId:a.empId,in:null,out:null,gpsIn:null,gpsOut:null};
    if(a.punchType==='in'){
      newRec.in=timeISO;
      newRec.gpsIn={lat:a.gps?a.gps.lat:null,lng:a.gps?a.gps.lng:null,acc:a.gps?a.gps.acc:null,makeup:true};
    } else {
      newRec.out=timeISO;
      newRec.gpsOut={lat:a.gps?a.gps.lat:null,lng:a.gps?a.gps.lng:null,acc:a.gps?a.gps.acc:null,makeup:true};
    }
    recs.push(newRec);
    LS.set('records',recs);
  }
}

function doReview(status){
  if(!reviewingId) return;
  // 補打卡審核
  if(reviewingId.startsWith('MAKEUP:')){
    doMakeupReview(status);
    return;
  }
  const apps=getApps();
  const idx=apps.findIndex(a=>a.id===reviewingId);
  if(idx===-1) return;
  const note=document.getElementById('reviewNote')?.value||'';
  const now=new Date().toISOString();
  const a=apps[idx];
  const isHR=currentUser.role==='admin';

  if(status==='rejected'){
    // 任一層拒絕即結束
    a.status='rejected';
    a.stage=a.status==='pending'?'sup':'hr';
    if(a.status==='pending'){a.supNote=note;a.supReviewedAt=now;}
    else{a.hrNote=note;a.hrReviewedAt=now;}
    a.stage=a.status==='sup_approved'||isHR?'hr':'sup';
    a.supNote=a.supNote||note;
    a.hrNote=isHR?note:a.hrNote;
    a.status='rejected';
  } else {
    // 核准
    if(a.status==='pending'){
      // 第1層直屬主管核准 → 進入HR審核
      a.status='sup_approved';
      a.stage='hr';
      a.supNote=note;
      a.supReviewedAt=now;
      // Email 通知HR
      var hrEmps=getAccounts().filter(acc=>acc.role==='admin');
      var hrEmpData=hrEmps.length?getEmpById(hrEmps[0].id):null;
      var hrEmail=hrEmpData?hrEmpData.email:'';
      if(hrEmail){
        var subj=encodeURIComponent('[請假待HR審核] '+a.empName+' '+{annual:'特休假',sick:'病假',personal:'事假',marriage:'婚假',funeral:'喪假',official:'公假'}[a.type]);
        var body2=encodeURIComponent('HR主管您好：\n\n'+a.empName+' 的請假申請已通過直屬主管審核，請登入系統進行最終審核。\n假期：'+({annual:'特休假',sick:'病假',personal:'事假',marriage:'婚假',funeral:'喪假',official:'公假'}[a.type]||a.type)+'\n期間：'+a.startDate+'\n主管備註：'+note);
        el.href='mailto:'+hrEmail+'?subject='+subj+'&body='+body2;
        el.style.display='none';
        document.body.appendChild(el);
        el.click();
        document.body.removeChild(el);
      }
    } else if(a.status==='sup_approved'){
      // 第2層HR核准 → 最終核准，自動扣假期
      a.status='approved';
      a.stage='done';
      a.hrNote=note;
      a.hrReviewedAt=now;
    }
  }
  apps[idx]=a;
  LS.set('leaveApps',apps);
  closeSheet('reviewSheet');
  var msg=status==='rejected'?'已拒絕 '+a.empName+' 的申請':a.status==='sup_approved'?'第1層核准！已通知HR審核':'&#x2705; 全數核准！假期已自動扣除';
  toast(status==='rejected'?'&#x274C;':'&#x2705;',msg);
  renderApprove(document.getElementById('adminScroll'));
  updateAdminBadge();
}

function saveEmp(empId){
  const emps=getEmps();
  const idx=emps.findIndex(e=>e.id===empId);if(idx===-1)return;
  emps[idx].name=document.getElementById('ee_name').value;
  emps[idx].dept=document.getElementById('ee_dept').value;
  emps[idx].pos=document.getElementById('ee_pos').value;
  emps[idx].salary=Number(document.getElementById('ee_sal').value)||0;
  emps[idx].email=document.getElementById('ee_email').value;
  emps[idx].workRule=document.getElementById('ee_rule').value;
  emps[idx].supervisorId=document.getElementById('ee_sup')?document.getElementById('ee_sup').value||'':'';
  LS.set('employees',emps);
  // update account role & password
  const accs=getAccounts();
  const ai=accs.findIndex(a=>a.id===empId);
  if(ai!==-1){
    accs[ai].role=document.getElementById('ee_role').value;
    const newPw=document.getElementById('ee_pw').value;
    if(newPw) accs[ai].pw=newPw;
    LS.set('accounts',accs);
  }

function doAddEmp(){
  const newId=document.getElementById('ne_id').value.trim();
  const name=document.getElementById('ne_name').value.trim();
  const pw=document.getElementById('ne_pw').value.trim()||'1234';
  const errEl=document.getElementById('addEmpError');

  // 驗證
  if(!newId){
    errEl.textContent='⚠️ 請填寫員工工號（登入帳號）';
    errEl.style.display='block'; return;
  }
  if(!name){
    errEl.textContent='⚠️ 請填寫員工姓名';
    errEl.style.display='block'; return;
  }
  if(pw.length<4){
    errEl.textContent='⚠️ 密碼至少需要 4 個字元';
    errEl.style.display='block'; return;
  }
  // 檢查工號是否重複
  const existAccs=getAccounts();
  const existEmps=getEmps();
  if(existAccs.find(a=>a.id===newId)||existEmps.find(e=>e.id===newId)){
    errEl.textContent='⚠️ 此工號已存在，請使用其他工號';
    errEl.style.display='block'; return;
  }
  errEl.style.display='none';

  const colors=['#5046e0','#2f5fd4','#7340c8','#2eaa6e','#e07c08','#16a085'];
  const emp={
    id:newId, name,
    dept:document.getElementById('ne_dept').value,
    pos:document.getElementById('ne_pos').value,
    salary:Number(document.getElementById('ne_sal').value)||0,
    email:document.getElementById('ne_email').value,
    workRule:document.getElementById('ne_rule').value,
    supervisorId:document.getElementById('ne_sup')?document.getElementById('ne_sup').value||'':'',
    color:colors[existEmps.length%colors.length]
  };
  existEmps.push(emp);
  LS.set('employees',existEmps);
  existAccs.push({id:newId,pw,role:document.getElementById('ne_role').value});
  LS.set('accounts',existAccs);
  closeSheet('empSheet');

}

function loadReport(){
  const val=document.getElementById('selMonth').value;
  const [y,m]=val.split('-').map(Number);
  const empId=document.getElementById('selEmp').value;
  const emps=empId==='all'?getEmps():getEmps().filter(e=>e.id===empId);
  const container=document.getElementById('reportResult');
  container.innerHTML='';
  emps.forEach(emp=>{
    const recs=getMonthRecs(y,m-1,emp.id);
    const leaveApps=getApps().filter(a=>a.empId===emp.id&&a.status==='approved');
    const daysInMonth=new Date(y,m,0).getDate();
    let rows=[],tH=0,tOT=0,wDays=0;
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow=new Date(ds).getDay();
      if((dow===0||dow===6)&&!recs.find(r=>r.date===ds)) continue;
      const rec=recs.find(r=>r.date===ds);
      const leave=leaveApps.find(a=>ds>=a.startDate&&ds<=a.endDate);
      const h=rec?calcHours(rec.in,rec.out,emp.workRule):0;
      const OT=Math.max(0,h-8);
      if(h>0){tH+=h;tOT+=OT;wDays++;}
      const badge=leave?`<span class="bgg bg-b">${LEAVE_LABEL[leave.type]||leave.type}</span>`:rec?.in&&rec?.out?(OT>0?`<span class="bgg bg-o">+${OT.toFixed(1)}h</span>`:`<span class="bgg bg-g">正常</span>`):rec?.in?`<span class="bgg bg-y">未下班</span>`:`<span class="bgg bg-gr">缺勤</span>`;
      rows.push({ds,dow,d,rec,h,OT,badge});
    }
    container.insertAdjacentHTML('beforeend',`
      <div style="margin-top:10px">
        <div class="sec-title"><span>${emp.name} — ${y}/${m}</span></div>
        <div class="ra" style="margin-top:8px">
          <button class="ra-btn ol" onclick="window.print()">🖨️ 列印</button>
          <button class="ra-btn so" onclick="exportExcel('${emp.id}',${y},${m})">📥 Excel</button>
        </div>
        <div class="card" style="overflow-x:auto;padding:10px">
          <div style="font-size:11px;color:var(--t2);margin-bottom:8px">出勤 <strong>${wDays}</strong>天 ｜ 工時 <strong style="color:var(--pd)">${tH.toFixed(1)}h</strong> ｜ 加班 <strong style="color:var(--orange)">${tOT.toFixed(1)}h</strong></div>
          <table>
            <thead><tr><th>日期</th><th>上班</th><th>下班</th><th>工時</th><th>狀態</th></tr></thead>
            <tbody>
              ${rows.map(r=>`<tr><td>${r.d}(${WDAY[r.dow]})</td><td>${r.rec?.in?fmtTime(r.rec.in):'--'}</td><td>${r.rec?.out?fmtTime(r.rec.out):'--'}</td><td>${r.h>0?r.h.toFixed(1)+'h':'--'}</td><td>${r.badge}</td></tr>`).join('')}
              <tr style="font-weight:700"><td colspan="3" style="color:var(--t2)">合計</td><td style="color:var(--pd)">${tH.toFixed(1)}h</td><td></td></tr>
            </tbody>
          </table>
        </div>
      </div>`);
  });
}

// 安全取得 GPS DOM 元素（彈窗關閉後元素不存在，避免報錯）
function gpsEl(id){ return document.getElementById(id); }
function gpsPanelOpen(){ return !!gpsEl('gpsDot'); }

function getGPS(){
  var cfg=getCfg();
  if(!navigator.geolocation){
    showGPSError('此裝置不支援定位功能');
    return;
  }
  try {
    navigator.geolocation.getCurrentPosition(
      function(pos){
        try { onGPSSuccess(pos,cfg); }
        catch(e){ console.warn('GPS success handler error:',e); }
      },
      function(err){
        try { onGPSError(err,cfg); }
        catch(e){ console.warn('GPS error handler error:',e); }
      },
      {enableHighAccuracy:false, timeout:8000, maximumAge:30000}
    );
  } catch(e) {
    console.warn('geolocation error:',e);
    showGPSError('定位功能發生錯誤，請重試');
  }
}

function onGPSSuccess(pos,cfg){
  if(!gpsPanelOpen()) return; // 彈窗已關閉，不處理
  var lat=pos.coords.latitude, lng=pos.coords.longitude;
  currentGPS={lat:parseFloat(lat.toFixed(6)),lng:parseFloat(lng.toFixed(6)),acc:Math.round(pos.coords.accuracy)};
  var dist=haversine(lat,lng,cfg.lat,cfg.lng);
  if(gpsEl('gpsDot')) gpsEl('gpsDot').className='gps-dot ok';
  if(gpsEl('gpsText')) gpsEl('gpsText').textContent='位置取得成功（精度 ±'+currentGPS.acc+'m）';
  if(gpsEl('gpsCoord')) gpsEl('gpsCoord').textContent='座標：'+currentGPS.lat+', '+currentGPS.lng;
  var isOK=dist<=cfg.rangeM, isWarn=dist<=cfg.rangeM*2;
  if(gpsEl('distBadge')) gpsEl('distBadge').innerHTML='<span class="dist-badge '+(isOK?'dist-ok':isWarn?'dist-warn':'dist-far')+'">&#x1F4CF; 距公司 '+dist+'m '+(isOK?'&#x2705; 範圍內':isWarn?'&#x26A0;&#xFE0F; 稍遠':'&#x274C; 範圍外')+'</span>';
  if(gpsEl('punchConfirmBtn')){
    gpsEl('punchConfirmBtn').disabled=false;
    gpsEl('punchConfirmBtn').textContent=isOK?'✅ 確認打卡':'⚠️ 仍要打卡';
  }
  // 若精度超過100m，嘗試高精度重取
  if(currentGPS.acc>100 && gpsPanelOpen()){
    if(gpsEl('gpsText')) gpsEl('gpsText').textContent='位置取得成功，嘗試提升精度中...（精度 ±'+currentGPS.acc+'m）';
    try {
      navigator.geolocation.getCurrentPosition(
        function(pos2){
          try { if(gpsPanelOpen()) onGPSSuccess(pos2,cfg); }
          catch(e){}
        },
        function(){},
        {enableHighAccuracy:true, timeout:10000, maximumAge:0}
      );
    } catch(e){}
  }
}

function onGPSError(err,cfg){
  var msg='';
  switch(err.code){
    case 1:
      msg='定位權限被拒絕';
      showGPSPermissionGuide();
      break;
    case 2:
      msg='無法取得位置，請確認已開啟位置服務';
      break;
    case 3:
      msg='定位超時';
      break;
    default:
      msg='定位失敗（錯誤碼：'+err.code+'）';
  }
  var requireGPS=cfg.requireGPS!==false; // 預設為 true（必須定位）
  if(!gpsPanelOpen()) return; // 彈窗已關閉，不處理
  if(gpsEl('gpsDot')) gpsEl('gpsDot').className='gps-dot err';

  if(requireGPS){
    if(gpsEl('gpsText')) gpsEl('gpsText').textContent='❌ '+msg+'，無法打卡';
    if(gpsEl('gpsCoord')) gpsEl('gpsCoord').textContent='';
    if(gpsEl('distBadge')) gpsEl('distBadge').innerHTML=
      '<div style="margin-top:8px;background:#ffe4e4;border-radius:9px;padding:9px 12px;font-size:12px;color:var(--pd);font-weight:600">'
      +'&#x1F6AB; 定位失敗，系統設定為「無法定位時禁止打卡」<br>'
      +'<span style="font-weight:400;font-size:11px">請開啟定位權限後重試</span>'
      +'</div>'
      +'<button onclick="getGPS()" style="margin-top:8px;width:100%;padding:10px;border-radius:10px;border:none;background:var(--grad);color:#fff;font-size:13px;font-weight:700;cursor:pointer">&#x1F504; 重新取得定位</button>';
    if(gpsEl('punchConfirmBtn')){
      gpsEl('punchConfirmBtn').disabled=true;
      gpsEl('punchConfirmBtn').textContent='❌ 無法打卡';
    }
    if(err.code===1) showGPSPermissionGuide();
  } else {
    if(gpsEl('gpsText')) gpsEl('gpsText').textContent='⚠️ '+msg+'（定位失敗，仍可打卡）';
    if(gpsEl('gpsCoord')) gpsEl('gpsCoord').textContent='座標：無法取得';
    if(gpsEl('distBadge')) gpsEl('distBadge').innerHTML=
      '<div style="margin-top:6px;background:var(--yl);border-radius:8px;padding:7px 10px;font-size:11px;color:var(--yellow)">'
      +'&#x26A0;&#xFE0F; 未取得定位，將以「無定位」記錄打卡'
      +'</div>'
      +'<button onclick="getGPS()" style="margin-top:7px;width:100%;padding:9px;border-radius:10px;border:none;background:var(--border);color:var(--t2);font-size:12px;font-weight:700;cursor:pointer">&#x1F504; 重試定位</button>';
    currentGPS={lat:null,lng:null,acc:null,failed:true};
    if(gpsEl('punchConfirmBtn')){

function submitLeave(){
  const type=document.getElementById('lType')?.value;
  const start=document.getElementById('lStart')?.value;
  const end=document.getElementById('lEnd')?.value;
  const reason=document.getElementById('lReason')?.value.trim();
  const proxy=document.getElementById('lProxy')?.value.trim()||'';
  const supId=document.getElementById('lSup')?.value||'';
  const errEl=document.getElementById('leaveFormErr');
  if(!start||!end){errEl.textContent='⚠️ 請填寫日期';errEl.style.display='block';return;}
  if(start>end){errEl.textContent='⚠️ 結束日期不能早於開始';errEl.style.display='block';return;}
  if(!reason){errEl.textContent='⚠️ 請填寫請假原因';errEl.style.display='block';return;}
  if(!supId){errEl.textContent='⚠️ 請選擇直屬主管';errEl.style.display='block';return;}
  errEl.style.display='none';
  const emp=currentUser.empData;
  const fileInput=document.getElementById('lAttach');
  const file=fileInput&&fileInput.files&&fileInput.files[0];

  // 計算請假天數（排除週末）
  var days=0,cur=new Date(start),endD=new Date(end);
  while(cur<=endD){if(cur.getDay()!==0&&cur.getDay()!==6)days++;cur.setDate(cur.getDate()+1);}

  // 取得主管 email
  const supEmp=getEmpById(supId);
  const supEmail=supEmp?getEmps().find(e=>e.id===supId)?.email||'':'';

  function saveAndNotify(attachData){
    const apps=getApps();
    const appId='LA'+Date.now();
    apps.push({
      id:appId,
      empId:currentUser.id,
      empName:emp?.name||currentUser.id,
      type,startDate:start,endDate:end,days,
      reason,proxy,supId,
      attachName:file?file.name:'',
      attachData:attachData||'',
      // 2層審核: pending → sup_approved → approved / rejected
      status:'pending',
      stage:'sup', // 目前在哪一層: sup=直屬主管, hr=HR主管
      supNote:'',supReviewedAt:'',
      hrNote:'',hrReviewedAt:'',
      appliedAt:new Date().toISOString()
    });
    LS.set('leaveApps',apps);
    closeSheet('leaveSheet');
    // Email 通知直屬主管（mailto）
    var supName=supEmp?supEmp.name:'主管';
    var subj=encodeURIComponent('[請假通知] '+emp.name+' 申請 '+days+'天 '+{annual:'特休假',sick:'病假',personal:'事假',marriage:'婚假',funeral:'喪假',official:'公假'}[type]);
    var body=encodeURIComponent('\u60a8\u597d\uff0c\n\n'+emp.name+' \u7533\u8acb\u88dc\u6253\u5361\uff0c\u8acb\u81f3\u7cfb\u7d71\u5be9\u6838\u3002\n\u65e5\u671f\uff1a'+d.date+'\n\u985e\u578b\uff1a'+typeLabel+'\u6253\u5361 '+d.time+'\n\u539f\u56e0\uff1a'+d.reason);
    if(supEmail){
      var mailLink='mailto:'+supEmail+'?subject='+subj+'&body='+body;
      // 建立隱藏連結點擊
      var a=document.createElement('a');
      a.href=mailLink;
      a.style.display='none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
    toast('✅','假期申請已送出！Email 通知已發送給主管');
    if(currentUser.role==='employee') empTab('status');
    updateEmpBadge();
  }

  if(file){
    var reader=new FileReader();
    reader.onload=function(e){saveAndNotify(e.target.result);};
    reader.onerror=function(){saveAndNotify('');};
    reader.readAsDataURL(file);
  } else {
    saveAndNotify('');
  }
}

function getMakeupGPS(){
  var cfg=getCfg();
  if(!navigator.geolocation){
    if(document.getElementById('makeupGpsDot')) document.getElementById('makeupGpsDot').className='gps-dot err';
    if(document.getElementById('makeupGpsText')) document.getElementById('makeupGpsText').textContent='❌ 此裝置不支援定位，無法申請補打卡';
    return;
  }
  try{
    navigator.geolocation.getCurrentPosition(
      function(pos){
        try{onMakeupGpsSuccess(pos,cfg);}catch(e){console.warn('makeup gps success error:',e);}
      },
      function(err){
        try{onMakeupGpsError(err,cfg);}catch(e){console.warn('makeup gps error:',e);}
      },
      {enableHighAccuracy:false, timeout:8000, maximumAge:30000}
    );
  }catch(e){
    if(document.getElementById('makeupGpsDot')) document.getElementById('makeupGpsDot').className='gps-dot err';
    if(document.getElementById('makeupGpsText')) document.getElementById('makeupGpsText').textContent='❌ 定位發生錯誤，無法申請補打卡';
  }
}

function onMakeupGpsSuccess(pos,cfg){
  if(!document.getElementById('makeupGpsDot')) return;
  var lat=pos.coords.latitude, lng=pos.coords.longitude;
  makeupGpsData={lat:parseFloat(lat.toFixed(6)),lng:parseFloat(lng.toFixed(6)),acc:Math.round(pos.coords.accuracy)};
  var dist=haversine(lat,lng,cfg.lat,cfg.lng);
  var isOK=dist<=cfg.rangeM, isWarn=dist<=cfg.rangeM*2;
  document.getElementById('makeupGpsDot').className='gps-dot ok';
  document.getElementById('makeupGpsText').textContent='位置取得成功（精度 ±'+makeupGpsData.acc+'m）';
  document.getElementById('makeupGpsCoord').textContent='座標：'+makeupGpsData.lat+', '+makeupGpsData.lng;
  document.getElementById('makeupDistBadge').innerHTML=
    '<span class="dist-badge '+(isOK?'dist-ok':isWarn?'dist-warn':'dist-far')+'">&#x1F4CF; 距公司 '+dist+'m '
    +(isOK?'&#x2705; 範圍內':isWarn?'&#x26A0;&#xFE0F; 稍遠':'&#x274C; 範圍外')+'</span>';
  var requireGPS=cfg.requireGPS!==false;
  if(requireGPS&&!isOK&&dist>cfg.rangeM*3){
    document.getElementById('makeupGpsConfirmBtn').disabled=true;
    document.getElementById('makeupGpsConfirmBtn').textContent='❌ 距離過遠';
    document.getElementById('makeupDistBadge').innerHTML+='<div style="margin-top:6px;font-size:11px;color:var(--pd)">距公司過遠（超過 '+cfg.rangeM*3+'m），無法申請補打卡</div>';
  } else {
    document.getElementById('makeupGpsConfirmBtn').disabled=false;
    document.getElementById('makeupGpsConfirmBtn').textContent=isOK?'✅ 確認送出':'⚠️ 仍要送出';
  }
}

function onMakeupGpsError(err,cfg){
  if(!document.getElementById('makeupGpsDot')) return;
  var requireGPS=cfg.requireGPS!==false;
  document.getElementById('makeupGpsDot').className='gps-dot err';
  var msg=err.code===1?'定位權限被拒絕':err.code===2?'無法取得位置':err.code===3?'定位超時':'定位失敗';
  if(requireGPS){
    document.getElementById('makeupGpsText').textContent='❌ '+msg+'，無法申請補打卡';
    document.getElementById('makeupDistBadge').innerHTML=
      '<div style="background:#ffe4e4;border-radius:9px;padding:9px 12px;font-size:12px;color:var(--pd);margin-top:8px">'
      +'&#x1F6AB; 定位失敗，無法申請補打卡，請開啟定位權限後重試</div>'
      +'<button onclick="getMakeupGPS()" style="margin-top:8px;width:100%;padding:9px;border-radius:10px;border:none;background:var(--grad);color:#fff;font-size:13px;font-weight:700;cursor:pointer">&#x1F504; 重新定位</button>';
    document.getElementById('makeupGpsConfirmBtn').disabled=true;
    document.getElementById('makeupGpsConfirmBtn').textContent='❌ 無法送出';
  } else {
    document.getElementById('makeupGpsText').textContent='⚠️ '+msg+'（無定位仍可申請）';
    makeupGpsData={lat:null,lng:null,acc:null,failed:true};
    document.getElementById('makeupGpsConfirmBtn').disabled=false;
    document.getElementById('makeupGpsConfirmBtn').textContent='⚠️ 無定位送出';
  }
}

function exportExcel(empId,y,m){
  const emp=getEmpById(empId);if(!emp)return;
  const recs=getMonthRecs(y,m-1,empId);
  const leaveApps=getApps().filter(a=>a.empId===empId&&a.status==='approved');
  const cfg=getCfg();
  const daysInMonth=new Date(y,m,0).getDate();
  const data=[['幸福企業股份有限公司 — 工作時間明細表'],[`員工：${emp.name}　工號：${emp.id}　部門：${emp.dept}`],[`月份：${y}年${m}月　工時規則：${RULE_LABEL[emp.workRule]||emp.workRule}`],[],[`日期`,`星期`,`上班`,`下班`,`工時(h)`,`加班(h)`,`狀態`,`上班GPS`,`距公司(m)`]];
  let tH=0,tOT=0;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(ds).getDay();
    if((dow===0||dow===6)&&!recs.find(r=>r.date===ds)) continue;
    const rec=recs.find(r=>r.date===ds);
    const leave=leaveApps.find(a=>ds>=a.startDate&&ds<=a.endDate);
    const h=rec?calcHours(rec.in,rec.out,emp.workRule):0,OT=Math.max(0,h-8);
    tH+=h;tOT+=OT;
    const gpsIn=rec?.gpsIn?`${rec.gpsIn.lat},${rec.gpsIn.lng}`:'';
    const distIn=rec?.gpsIn?haversine(rec.gpsIn.lat,rec.gpsIn.lng,cfg.lat,cfg.lng):'';
    const status=leave?LEAVE_LABEL[leave.type]||leave.type:rec?.in&&rec?.out?'正常':rec?.in?'未下班':'缺勤';
    data.push([ds,`週${WDAY[dow]}`,rec?.in?fmtTime(rec.in):'',rec?.out?fmtTime(rec.out):'',h>0?+h.toFixed(2):0,OT>0?+OT.toFixed(2):0,status,gpsIn,distIn]);
  }
  data.push([]);data.push(['','','','月合計',+tH.toFixed(2),+tOT.toFixed(2),'','','']);

// ── SHA-256 ───────────────────────────────────────
function sha256(s){
  return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s))
    .then(function(b){return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');});
}

function loadAllData(){

  if(newPw!==confirmPw){errEl.textContent='兩次密碼不一致';errEl.style.display='block';return;}

// ── Override submitLeave ──────────────────────────
window.submitLeave=function(){

  var end=document.getElementById('lEnd')?document.getElementById('lEnd').value:'';

  var emp=window.currentUser.empData;

  var supEmp=getEmpById(supId);
  function saveLeave(attachData){

// ── Override doReview ─────────────────────────────
window.doReview=function(status){
  if(!window.reviewingId)return;
  var rid=window.reviewingId;
  var note=(document.getElementById('reviewNote')?document.getElementById('reviewNote').value:'')||'';
  var now=new Date().toISOString();

  if(rid.startsWith('MAKEUP:')){
    var realId=rid.replace('MAKEUP:','');
    var a=getMakeupApps().find(function(x){return x.id===realId;});
    if(!a)return;
    var upd={};
    if(status==='rejected'){upd={status:'rejected',sup_note:a.supNote||note,hr_note:note,hr_reviewed_at:now};}
    else if(a.status==='pending'){upd={status:'sup_approved',stage:'hr',sup_note:note,sup_reviewed_at:now};}
    else if(a.status==='sup_approved'){
      upd={status:'approved',stage:'done',hr_note:note,hr_reviewed_at:now};
      var timeISO=a.date+'T'+a.punchTime+':00';
      var ex=getRecs().find(function(r){return r.date===a.date&&r.empId===a.empId;});
      if(ex){sbupd('records',a.punchType==='in'?{time_in:timeISO,gps_in:Object.assign({},a.gps,{makeup:true})}:{time_out:timeISO,gps_out:Object.assign({},a.gps,{makeup:true})},{emp_id:a.empId,date:a.date});}
      else{sbins('records',{emp_id:a.empId,date:a.date,time_in:a.punchType==='in'?timeISO:null,time_out:a.punchType==='out'?timeISO:null,gps_in:a.punchType==='in'?Object.assign({},a.gps,{makeup:true}):null,gps_out:a.punchType==='out'?Object.assign({},a.gps,{makeup:true}):null});}
    }
    sbupd('makeup_apps',upd,{id:realId}).then(function(){return loadAllData();}).then(function(){
      closeSheet('reviewSheet');
      toast(status==='rejected'?'❌':'✅',status==='rejected'?'已拒絕補打卡':upd.status==='sup_approved'?'第1層核准！':'✅ 補打卡核准並寫入紀錄');
      renderApprove(document.getElementById('adminScroll'));updateAdminBadge();
    });
    return;
  }

  var b=getApps().find(function(x){return x.id===rid;});
  if(!b)return;
  var upd2={};
  if(status==='rejected'){upd2={status:'rejected',sup_note:b.supNote||note,hr_note:note,sup_reviewed_at:b.supReviewedAt||now,hr_reviewed_at:now};}
  else if(b.status==='pending'){
    upd2={status:'sup_approved',stage:'hr',sup_note:note,sup_reviewed_at:now};
    var hrAcc=(DB.accs||[]).find(function(x){return x.role==='admin';});
    var hrEmp=hrAcc?getEmpById(hrAcc.id):null;
    if(hrEmp&&hrEmp.email){
      var el=document.createElement('a');
      el.href='mailto:'+hrEmp.email+'?subject='+encodeURIComponent('[請假待HR審核] '+b.empName)+'&body='+encodeURIComponent(b.empName+' 的請假已通過主管審核，請進行最終審核。');
      el.style.display='none';document.body.appendChild(el);el.click();document.body.removeChild(el);
    }
  }else if(b.status==='sup_approved'){upd2={status:'approved',stage:'done',hr_note:note,hr_reviewed_at:now};}
  sbupd('leave_apps',upd2,{id:rid}).then(function(){return loadAllData();}).then(function(){
    closeSheet('reviewSheet');
    var msg=status==='rejected'?'已拒絕 '+b.empName+' 的申請':upd2.status==='sup_approved'?'第1層核准！已通知HR':'✅ 全數核准！';
    toast(status==='rejected'?'❌':'✅',msg);
    renderApprove(document.getElementById('adminScroll'));updateAdminBadge();
  });
};

// ── Override confirmMakeupGps ─────────────────────
window.confirmMakeupGps=function(){
  if(!window.makeupPendingData)return;
  var d=window.makeupPendingData;
  var emp=window.currentUser.empData;
  var supEmp=getEmpById(d.supId);
  sbins('makeup_apps',{id:'MK'+Date.now(),emp_id:window.currentUser.id,emp_name:emp?emp.name:window.currentUser.id,
    date:d.date,punch_type:d.type,punch_time:d.time,sup_id:d.supId,reason:d.reason,
    gps:window.makeupGpsData,status:'pending',stage:'sup',applied_at:new Date().toISOString()})
  .then(function(){return loadAllData();}).then(function(){
    closeSheet('makeupGpsSheet');
    window.makeupPendingData=null;window.makeupGpsData=null;
    if(supEmp&&supEmp.email){
      var tl=d.type==='in'?'上班':'下班';
      var el=document.createElement('a');
      el.href='mailto:'+supEmp.email+'?subject='+encodeURIComponent('[補打卡審核] '+emp.name)+'&body='+encodeURIComponent(emp.name+' 申請補打卡。日期：'+d.date+' 類型：'+tl+'打卡 '+d.time+' 原因：'+d.reason);
      el.style.display='none';document.body.appendChild(el);el.click();document.body.removeChild(el);
    }
    toast('✅','補打卡申請已送出！等待主管審核');
    if(window.currentUser.role==='employee')empTab('clock');
    updateEmpBadge();
  });
};

// ── Init: call immediately (DOM already ready since we run after </html>) ──
window.seedData();

})(); // end IIFE
</script>
